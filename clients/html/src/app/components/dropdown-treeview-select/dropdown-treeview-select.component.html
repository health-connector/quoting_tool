<ng-template
  #itemTemplate
  let-item="item"
  let-onCollapseExpand="onCollapseExpand"
  let-onCheckedChange="onCheckedChange"
>
  <div class="form-inline row-item">
    @if (item.children) {
      <i
        (click)="onCollapseExpand()"
        aria-hidden="true"
        class="fa"
        [class.fa-caret-right]="item.collapsed"
        [class.fa-caret-down]="!item.collapsed"
      ></i>
    }
    <label class="form-check-label" (click)="select(item)">{{
      item.text
    }}</label>
  </div>
</ng-template>
<ng-template
  #headerTemplate
  let-config="config"
  let-item="item"
  let-onCollapseExpand="onCollapseExpand"
  let-onCheckedChange="onCheckedChange"
  let-onFilterTextChange="onFilterTextChange"
>
  @if (config.hasFilter) {
    <div class="row row-filter">
      <div class="col-12">
        <input
          class="form-control"
          type="text"
          placeholder="Search SIC"
          [(ngModel)]="filterText"
          (ngModelChange)="onFilterTextChange($event)"
        />
      </div>
    </div>
  }
  @if (config.hasAllCheckBox || config.hasCollapseExpand) {
    <div class="row">
      <div class="col-12">
        @if (config.hasAllCheckBox) {
          <label (click)="select(item)">
            <strong></strong>
          </label>
        }
        @if (config.hasCollapseExpand) {
          <label
            class="pull-right"
            (click)="onCollapseExpand()"
          >
            <i
              title="test 1"
              aria-hidden="true"
              class="fa"
              [class.fa-expand]="item.collapsed"
              [class.fa-compress]="!item.collapsed"
            ></i>
          </label>
        }
      </div>
    </div>
  }
  @if (config.hasDivider) {
    <div class="dropdown-divider"></div>
  }
</ng-template>
<ngx-treeview
  [config]="config"
  [headerTemplate]="headerTemplate"
  [items]="items"
  [itemTemplate]="itemTemplate"
>
</ngx-treeview>
